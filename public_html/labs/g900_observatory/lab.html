<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>G900 Witness Observatory | Aletheos Labs</title>
  <link rel="stylesheet" href="lab.css" />
</head>
<body>
  <main class="lab-shell">
    <header class="lab-hero">
      <p class="eyebrow">Aletheos Labs</p>
      <h1>G900 Witness Observatory</h1>
      <p class="lede">Blank rebuild stage for the G900 viewer.</p>
    </header>

    <section class="stage-card" aria-label="G900 blank stage">
      <div class="stage-toolbar">
        <div class="sheet-stepper-controls">
          <div class="sheet-button-row">
            <button id="step-back-btn" class="mini-transport-btn" type="button" aria-label="Step back one sheet">&lt;&lt;</button>
            <button id="play-toggle" class="mini-transport-btn" type="button" aria-label="Play sheet clock">&#9654;</button>
            <button id="reset-stage-btn" class="mini-transport-btn" type="button" aria-label="Reset stage">&#8635;</button>
            <button id="step-forward-btn" class="mini-transport-btn" type="button" aria-label="Step forward one sheet">&gt;&gt;</button>

            <button class="mini-transport-btn" type="button" data-view-mode="x" aria-label="X view">X</button>
            <button class="mini-transport-btn" type="button" data-view-mode="y" aria-label="Y view">Y</button>
            <button class="mini-transport-btn" type="button" data-view-mode="z" aria-label="Z view">Z</button>
            <button class="mini-transport-btn angle-preset-btn" type="button" data-view-mode="iso" aria-label="Isometric view">ISO</button>
            <label class="mini-transport-btn stage-pill stage-grid-toggle" title="Stage Grid" aria-label="Toggle stage grid">
              <input id="stage-grid-toggle" type="checkbox" checked />
              <span class="stage-pill-label">#</span>
            </label>
          </div>

          <div class="sheet-rate-head">
            <div class="sheet-rate-left">
              <label for="sheet-rate-slider">Sheets/sec</label>
              <span id="sheet-rate-readout">333.00</span>
            </div>
            <span id="sheet-counter-readout">Sheet 0</span>
          </div>

          <input id="sheet-rate-slider" type="range" min="0.25" max="960" step="0.25" value="333" />
</div>
      </div>

      <div class="stage-frame">
        <canvas id="stage-canvas" aria-label="Blank G900 canvas"></canvas>
        <div class="stage-scroll-grabber" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </section>

    <section class="lab-note">
<div class="layer-panel graph-layer-panel" aria-label="Graph layer controls">
        <div class="layer-panel-head">
          <div>
            <p class="layer-panel-eyebrow">Layer 1</p>
            <h2>Graph</h2>
          </div>
          <label class="layer-switch">
            <input id="graph-layer-toggle" type="checkbox" checked />
            <span>On</span>
          </label>
        </div>

        <label class="layer-slider-row" for="graph-vertices-slider">
          <span>Vertices</span>
          <input id="graph-vertices-slider" type="range" min="0" max="100" step="1" value="86" />
          <output id="graph-vertices-readout">86</output>
        </label>

        <label class="layer-slider-row" for="graph-edges-slider">
          <span>Edges</span>
          <input id="graph-edges-slider" type="range" min="0" max="100" step="1" value="78" />
          <output id="graph-edges-readout">78</output>
        </label>
      </div>
<div class="stage-console-panel" aria-label="Stage console">
        <div class="stage-console-head">
          <span>Console</span>
          <span>readout</span>
        </div>
        <div class="stage-console-body">
          <p id="kernel-status-line" class="kernel-status-line">Kernel: pending</p>
          <p id="kernel-layer-line" class="kernel-layer-line">Grammar pending</p>
          <p id="static-body-line" class="kernel-layer-line">BODY pending</p>
        </div>
      </div>
</section>
  </main>

  <footer class="lab-footer">
    <p>2026 Centre of Recursive Inquiry. Aletheos.ai is the public research surface for CoRI and Thalean Action Theory.</p>
  </footer>

  <script type="module" src="g900_grammar_stage_v0.js?v=primary-grammar-blank-23"></script>
</body>
</html>
