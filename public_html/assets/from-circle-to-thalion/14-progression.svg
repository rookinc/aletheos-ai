  <ellipse class="line" cx="640" cy="260" rx="45" ry="62"/>
  <path class="thin" d="M130 260 L150 260 M235 260 L250 260 M345 260 L365 260 M460 260 L485 260 M585 260 L595 260"/>
  <text class="tiny" x="65" y="345">circle</text>
