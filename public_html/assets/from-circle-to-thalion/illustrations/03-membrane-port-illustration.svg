<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img">
  <title>Membrane with ports</title>

  <style>
    .bg { fill: #fbfaf7; }
    .paper { fill: #fffdf8; stroke: #ded8cc; stroke-width: 2; }
    .ink { fill: none; stroke: #171717; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
    .thin { fill: none; stroke: #3a3a3a; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    .ghost { fill: none; stroke: #777; stroke-width: 3; stroke-dasharray: 9 9; stroke-linecap: round; stroke-linejoin: round; }
    .membrane { fill: none; stroke: #5f7f86; stroke-width: 38; stroke-linecap: round; opacity: 0.78; }
    .amber { fill: #f2c078; opacity: 0.32; }
    .blue { fill: #9fcbd0; opacity: 0.36; }
    .green { fill: #b8d59a; opacity: 0.35; }
    .red { fill: #c44; opacity: 0.85; }
    .node { fill: #171717; stroke: #171717; stroke-width: 3; }
    .open { fill: #fffdf8; stroke: #171717; stroke-width: 5; }
    .label { font-family: Georgia, "Times New Roman", serif; font-size: 28px; fill: #272727; }
    .small { font-family: Georgia, "Times New Roman", serif; font-size: 18px; fill: #4b4b4b; }
    .caption { font-family: Georgia, "Times New Roman", serif; font-size: 24px; fill: #333; }
  </style>

  <rect class="bg" x="0" y="0" width="900" height="620"/>
  <rect class="paper" x="42" y="38" width="816" height="544" rx="36"/>

  <circle class="membrane" cx="450" cy="285" r="150"/>
  <circle class="thin" cx="450" cy="285" r="107"/>
  <circle class="amber" cx="450" cy="285" r="106"/>
  <path class="ink" d="M450 150 L585 285 L450 420 L315 285 Z"/>
  <path class="thin" d="M120 285 L300 285"/>
  <path class="thin" d="M600 285 L780 285"/>
  <circle class="node" cx="450" cy="135" r="17"/>
  <circle class="node" cx="580" cy="210" r="17"/>
  <circle class="node" cx="580" cy="360" r="17"/>
  <circle class="node" cx="450" cy="435" r="17"/>
  <circle class="node" cx="320" cy="360" r="17"/>
  <circle class="node" cx="320" cy="210" r="17"/>
  <circle class="red" cx="450" cy="285" r="18"/>
  <text class="caption" x="194" y="520">A membrane admits relation through lawful ports.</text>

</svg>
